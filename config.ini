[general]
username = user

[llama_server]
# 同梱の llama-server.exe を自動起動するか（v1.1.0 同梱版用）
auto_start = true
# llama-server.exe へのパス（exe からの相対 OK）
executable_path = llama_server/llama-server.exe
# Vision 対応モデル（GGUF）
model_path = models/Qwen3.5-9B-Q4_K_M.gguf
# Vision プロジェクション（mmproj）。空なら未使用
mmproj_path = models/mmproj-BF16.gguf
# 待ち受けポート
port = 8080
# GPU レイヤー数（-1=全部、0=CPU only）
n_gpu_layers = -1
# コンテキストサイズ
ctx_size = 8192
# 起動待ちタイムアウト（秒）。大きいモデルは長めに
startup_timeout_sec = 180
# Qwen3 / DeepSeek-R1 等の thinking（推論ブロック）を無効化
# true=思考トークンを生成しない（コメント生成が速くなる、推奨）
# false=思考あり。レスポンスの <think>...</think> はクライアント側で除去される
disable_thinking = true
# 追加引数（例: --threads 8）
extra_args =

[llm]
# LLM API エンドポイント。空のままなら同梱 llama-server の URL が自動使用される。
# 外部 LM Studio や別ホストの llama-server を使う場合のみ設定。
api_base_url =

# Vision対応モデル（スクリーンショット解析用）
vision_model_name = local-model

# テキストのみのサマリー生成用（別のモデルを指定可能）
summary_model_name = local-model

# APIタイムアウト（秒）
timeout_sec = 60

# 失敗時の最大リトライ回数
max_retries = 10

# 生成の創造性（0.0〜2.0）
temperature = 1.0

# 行動ログ1件あたりの最大トークン数
action_log_max_tokens = 300

# 30分サマリーの最大トークン数
summary_max_tokens = 2048

# 行動ログ用システムプロンプト
action_log_system_prompt = ユーザーは何を見ているかを、アクティブになっているウィンドウの名前と画面内容を基準に分析し、70文字程度で出力してください。可能であれば、画面の雰囲気や特徴(例:◯◯に関するエラーが出ている、◯◯といったコメントが書かれている、◯◯を編集しているようだ、◯◯の絵が写っている、など)についての簡単な観察も一言添えてください。
### thinkは省略してください。これは非常に重要です。

# サマリー用システムプロンプト
summary_system_prompt = 30分間の行動ログを要約し、4096文字ほどの記録として出力してください。主な活動、時間配分、特筆すべき行動パターンを含めてください。

# スマートモードの最大トークン数（複数コメントJSON生成）
smart_mode_max_tokens = 400

# ベーシックモードの最大トークン数（単一ペルソナコメント）
basic_mode_max_tokens = 100

# API連続失敗時のクールダウン期間（秒）
api_error_cooldown_sec = 15

# APIモード: "openai"（/v1/chat/completions）または "lmstudio"（/api/v1/chat、MCP対応）
api_mode = openai

# LM Studio APIトークン（api_mode=lmstudio でトークン認証有効時に必要）
# api_token =

# MCP統合（カンマ区切り、例: mcp/wikipedia,mcp/duckduckgo）空欄ならMCP不使用
# mcp_integrations =

[performance]
# LLMワーカースレッド数（推奨: 1-4）
llm_worker_threads = 2

# スレッド間通信用キューサイズ
screenshot_queue_size = 1

# アニメーションフレームレート（FPS）
animation_fps = 24

# コメントキューの最大サイズ（オーバーレイバッファ）
comment_queue_size = 100

[screenshot]
# アクティブ時のキャプチャ間隔（秒） 10.0
capture_interval_sec = 7.0

# アイドル検出設定
# アイドル判定までの無操作時間（秒）
idle_threshold_sec = 5.0

# アイドル時のキャプチャ間隔（秒） 15.0
idle_interval_sec = 6.0

# 長時間アイドル時の最大キャプチャ間隔（秒）
max_interval_sec = 17.0

# アイドル間隔の指数バックオフ係数
idle_backoff_factor = 2.0

# スクリーンショット保存モード: temp（自動削除）/ archive（永久保存）
storage_mode = temp

# スクリーンショット一時保存フォルダ
temp_dir = screenshots_temp

# 画像品質（1〜100、JPEG圧縮用）
image_quality = 90

# 画像形式: png / jpeg
image_format = png

# 一時ファイルの最大保持数（ローリングバッファ） 5
max_temp_files = 1

# 大きいスクリーンショットのリサイズ幅（0=リサイズなし）
max_width = 1280

# オーバーレイのコメントをスクリーンショットから除外する（true/false）
# true: AIが自分のコメントを見ない（フィードバックループ防止）
# false: AIが自分のコメントも見える（コメントにコメントする動作を許容）
exclude_overlay_from_capture = true

# ========================================
# スクロールコメントオーバーレイ設定
# ========================================
[overlay]
# 基本設定
num_lanes = 9                 # レーン数（横線の数）

# スクロール設定
scroll_speed_base = 400        # 基本スクロール速度（ピクセル/秒） 300
speed_variation = 0.3          # 速度のランダム変動（±40%）

# フォント設定
font_family = MS Gothic        # フォント（ゴシック体推奨）

# スタイル別フォントサイズ（0 = ペルソナ設定のサイズを使用）
scroll_font_size = 0               # scrollスタイル用（0=ペルソナ設定）
toast_font_size = 18               # toastスタイル用（小さめ推奨）
chatlog_font_size = 16             # chatlogスタイル用（小さめ推奨）

# 視覚効果
enable_stroke = true           # 文字の縁取り（視認性向上）
stroke_width = 1               # 縁取りの太さ（ピクセル）
stroke_color = #000000         # 縁取りの色（黒）

# テキスト測定失敗時の代替幅（ピクセル）
fallback_comment_width = 100

# ========================================
# 表示スタイル設定
# ========================================
# デフォルト表示スタイル: scroll / toast / chatlog
display_style = scroll

# --- Toast（通知ポップアップ）設定 ---
toast_lifetime_sec = 3.0           # 通知の表示時間（秒）
toast_fade_duration_sec = 0.5      # フェードイン/アウト時間（秒）
toast_max_visible = 4              # 同時表示最大数
toast_margin_right = 30            # 右端からのマージン（ピクセル）
toast_margin_bottom = 60           # 下端からのマージン（ピクセル）
toast_spacing = 8                  # 通知間の縦間隔（ピクセル）
toast_padding_h = 16               # 通知内部の水平パディング
toast_padding_v = 10               # 通知内部の垂直パディング
toast_bg_color = #1A1A2E              # 通知の背景色
toast_bg_opacity = 0.0                # 背景の不透明度（0.0=完全透明 ～ 1.0=不透明）
toast_text_opacity = 0.6              # 文字の不透明度（0.0=完全透明 ～ 1.0=不透明）

# --- Chatlog（チャット欄）設定 ---
chatlog_max_lines = 12             # 表示する最大行数
chatlog_panel_width = 800          # パネル幅（ピクセル）
chatlog_panel_height = 330         # パネル高さ（ピクセル）
chatlog_margin_left = 15           # 左端からのマージン
chatlog_margin_bottom = 60         # 下端からのマージン
chatlog_bg_color = #0D0D0D         # パネル背景色
chatlog_bg_opacity = 0.0           # パネルの不透明度（擬似）
chatlog_line_spacing = 6           # 行間（ピクセル）
chatlog_padding = 12               # パネル内パディング
chatlog_name_visible = false        # ペルソナ名を表示するか

# ========================================
# パイプライン設定
# ========================================
[pipeline]
# 動作モード
mode = smart                    # smart: 1回のAPI呼び出し（JSON） / basic: 複数回呼び出し

# Smart Mode 設定
smart_mode_max_failures = 5     # 連続失敗回数の上限

# ========================================
# ペルソナ設定
# ========================================
[personas]
# 配分（重み）
narrator_weight = 20
guesser_weight = 10
critic_weight = 25
instructor_weight = 25
analyzer_weight = 20

# 色設定（16進数）
narrator_color = #FFFFFF   # 白
guesser_color = #00FF00       # 緑
critic_color = #FF0000     # 赤
instructor_color = #00FFFF # シアン
analyzer_color = #FFFF00    # 黄

# フォントサイズ（ピクセル）
narrator_size = 26
guesser_size = 24
critic_size = 26
instructor_size = 26
analyzer_size = 24

# 表示スタイル（per-persona、省略時はグローバルdisplay_style使用）
# narrator_display_style = scroll
# guesser_display_style = toast
# critic_display_style = scroll
# instructor_display_style = chatlog
# analyzer_display_style = chatlog

# 最大文字数
narrator_max_chars = 40
guesser_max_chars = 40
critic_max_chars = 40
instructor_max_chars = 40
analyzer_max_chars = 40

# ========================================
# ペルソナ別プロンプト
# ========================================
[prompts_narrator]
smart = 客観的な観察（40文字以内）
basic = あなたは客観的な観察者です。ユーザーの画面を見て、何をしているか40文字以内で淡々と解説してください。感情的な表現は避け、事実のみを述べます。

[prompts_guesser]
# smart = 画面に映っている物の固有名詞を特定して名前だけ呟く（30文字以内）
# smart = ネットスラング・ユーモア（30文字以内、「草」「www」「それな」など）
smart = ユーザーのテキスト入力中を検出し、何を入力しようとしているか推測して呟く（30文字以内）
# basic = あなたは画面に映っているモノの名前を言い当てる視聴者です。画面内に映っている製品、キャラクター、武器、車、ロゴ、ソフトウェア、ゲームタイトルなど、固有名詞で特定できるものを1つ選び、その名前だけを30文字以内で短く呟いてください。例:「M4A1だ」「あ、スープラ」「Chromeじゃん」「リンクだ」。特定できるものがなければ「なんだこれ」「見たことある気がする」のように反応してください。解説や説明は不要です。名前だけ言ってください。
# basic = あなたはネットスラングを使うユーモラスな実況者です。「草」「www」「やばい」などのネットスラングを積極的に使い、30文字以内でツッコミを入れてください。面白おかしく反応します。
basic = あなたは画面を覗き見している視聴者です。ユーザーがテキストを入力中（カーソルが点滅している、入力途中のテキストがある、テキストボックスがアクティブなど）の場合、画面全体の文脈や入力中の内容から、ユーザーが次に何を入力しようとしているかを推測し、40文字以内で呟いてください。例:「returnって書くんでしょ」「ファイル名入れるのかな」「パスワード？」。入力中でない場合は「何か書くのかな」「待機中…」と呟いてください。断定ではなく推測口調で、軽い感じで言ってください。

[prompts_critic]
smart = 批判的・ツッコミ（40文字以内）
basic = あなたは厳しい批評家です。ユーザーの行動や確認不足な部分に対して批判的・ツッコミ的なコメントを40文字以内で述べてください。辛口でOKです。

[prompts_instructor]
smart = 助言・指導（40文字以内）
basic = あなたは親切な指導者です。ユーザーに対してアドバイスや助言、提案などを40文字以内で提供してください。上から目線ではなく、親切に教えます。

[prompts_analyzer]
# smart = 超短リアクション（10文字以内、「!?」「お」「草」など）
smart = ユーザーの注目箇所を検出し、注目箇所の外国語を和訳、計算式の答えを出力、長文を要約する（40文字以内）
# basic = 超短いリアクションのみを10文字以内で出力してください。例:「www」「草」「!?」「お」「すごい」「きた」など。文章ではなく、感嘆詞や短い単語のみです。
basic = あなたは画面の情報を処理するbotです。以下の優先順で40文字以内で出力してください。(1)画面に日本語以外の文章があれば、最も目立つものを短く日本語に訳す。例:「"Save changes?"→変更を保存する？」「"Game Over"→ゲームオーバー」。(2)計算式や数式があれば答えを出す。例:「=128」「≒3.14」。(3)長い日本語の文章があれば要点だけ要約する。例:「要するに再起動しろってこと」。(4)どれにも該当しなければ「―」とだけ出力。余計な説明や感想は一切不要。結果だけを出してください。



# ========================================
# ディスプレイ設定
# ========================================
[display]
# モニター指定: primary / secondary / 1, 2, ...（Windowsのモニター番号順）

# キャプチャー対象モニター（スクリーンショットを撮影するモニター）
capture_monitor = primary

# コメント表示モニター（スクロールコメントを表示するモニター）
overlay_monitor = primary
